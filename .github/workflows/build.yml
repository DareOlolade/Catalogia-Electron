name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write    # Grants permission to create releases and upload files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run build:win

      - name: Create Release and Upload Installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}   # Automatically increments the version (e.g., v1.0.1, v1.0.2)
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: dist/*.exe                         # Selects your built Windows installer
